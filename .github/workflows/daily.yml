name: KPop Daily Tracker

on:
  schedule:
    # 每天一次（台灣時間 09:00 = UTC 01:00），節省 Anthropic API 額度。
    # 剛上線幾小時的 MV 會在隔天這次補抓；想當天補可手動觸發。
    - cron: "0 1 * * *"
  # 也可以在 GitHub 手動觸發
  workflow_dispatch:
    inputs:
      test_notify:
        description: "送一則 Discord 測試通知（驗證 webhook）"
        type: boolean
        default: false

permissions:
  contents: write      # commit 資料回 repo
  pages: write         # 部署 GitHub Pages
  id-token: write      # deploy-pages 需要 OIDC

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1：爬取 Wikipedia / PTT / namuwiki，AI 篩選，驗證 MV，產生 latest.json ──
      - name: Scrape sources
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SITE_URL: "https://h4you.github.io/kpop-tracker/"
          TEST_NOTIFY: ${{ github.event.inputs.test_notify }}
          # 每日 API 花費上限（美元）；程式累計 token 成本超過就停止後續 AI 呼叫
          DAILY_USD_LIMIT: "0.30"
        run: python src/scraper.py

      # ── Step 2：把 latest.json commit 回 repo ──
      - name: Commit updated data
        run: |
          git config user.name  "kpop-tracker[bot]"
          git config user.email "kpop-tracker[bot]@users.noreply.github.com"
          git add data/latest.json data/archive.json data/albums.json data/views_history.json data/upcoming.ics
          git diff --staged --quiet || \
            git commit -m "chore: daily update $(date +'%Y-%m-%d')"
          git push

      # ── Step 3：部署 GitHub Pages（官方 Actions 部署；舊的 branch-based 管線已 401 損壞）──
      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -a --exclude '.git' --exclude '.github' --exclude 'src' \
                --exclude '_site' --exclude 'requirements.txt' --exclude '*.md' . _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Step 4：若有失敗，發 GitHub Issue 通知 ──
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `❌ KPop Tracker 執行失敗 ${new Date().toLocaleDateString('zh-TW')}`,
              body:  `自動化流程異常，請檢查 [Actions 記錄](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})。`,
              labels: ["bug", "automation"],
            });
