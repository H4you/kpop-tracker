<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專輯資料庫 · KPop Girl Group Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0e0c10; --surface:#161319; --surface2:#1e1b22; --surface3:#252029;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --pink:#e8537c; --pink-dim:rgba(232,83,124,0.08); --pink-text:#f4a0b8;
  --teal:#2ec4a0; --amber:#f5a623;
  --text:#f0edf3; --text2:#9d98a6; --text3:#6b6573;
  --radius:10px; --radius-lg:14px;
  --font-display:'Bebas Neue', sans-serif; --font-body:'Noto Sans TC', sans-serif;
}
html { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:15px; line-height:1.6; }
body { min-height:100vh; }
a { color:inherit; text-decoration:none; }
button { font-family:var(--font-body); cursor:pointer; border:none; background:none; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:99px; }
.shell { max-width:980px; margin:0 auto; padding:0 20px 80px; }

header { padding:32px 0 18px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:14px; }
.brand-icon { font-size:30px; }
.brand-name { font-family:var(--font-display); font-size:30px; letter-spacing:0.04em; }
.brand-sub { font-size:12px; color:var(--text3); }
.nav-link { font-size:13px; color:var(--text2); border:0.5px solid var(--border2); padding:7px 14px; border-radius:99px; transition:all .15s; }
.nav-link:hover { background:var(--surface2); color:var(--text); }

.toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }
.search { flex:1; min-width:200px; background:var(--surface2); border:0.5px solid var(--border2); border-radius:var(--radius); color:var(--text); padding:9px 13px; font-size:13px; font-family:var(--font-body); }
.search:focus { outline:none; border-color:var(--pink); }
.lib-meta { font-size:12px; color:var(--text3); }

.status { padding:48px 20px; text-align:center; color:var(--text3); }

/* 女團區塊 */
.group-block { margin-bottom:30px; }
.group-head { display:flex; align-items:baseline; gap:10px; margin-bottom:12px; padding-bottom:8px; border-bottom:0.5px solid var(--border); }
.group-name { font-size:18px; font-weight:500; color:var(--text); }
.group-count { font-size:12px; color:var(--text3); }

/* 專輯牆 */
.album-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:16px; }
.album { cursor:pointer; }
.album-cover { position:relative; width:100%; aspect-ratio:1; border-radius:var(--radius); overflow:hidden; background:var(--surface3); border:0.5px solid var(--border); }
.album-cover img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .2s, opacity .2s; }
.album:hover .album-cover img { transform:scale(1.05); opacity:.85; }
.album-cover .ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:12px; }
.album-info { padding:8px 2px 0; }
.album-title { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.album-year { font-size:11px; color:var(--text3); }

/* 曲目彈窗 */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.78); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
.modal.show { display:flex; }
.modal-box { width:min(560px,100%); max-height:86vh; overflow-y:auto; background:var(--surface); border-radius:14px; border:0.5px solid var(--border2); }
.modal-cover { display:flex; gap:14px; padding:18px; align-items:center; border-bottom:0.5px solid var(--border); }
.modal-cover img { width:96px; height:96px; border-radius:10px; object-fit:cover; flex-shrink:0; }
.modal-cv-info { min-width:0; }
.modal-album { font-size:16px; font-weight:500; }
.modal-sub { font-size:12px; color:var(--text3); margin-top:4px; }
.modal-close { position:absolute; top:14px; right:18px; font-size:22px; color:var(--text3); }
.track-row { display:flex; gap:12px; padding:9px 18px; align-items:center; border-bottom:0.5px solid var(--border); }
.track-row:last-child { border-bottom:none; }
.track-no { font-size:12px; color:var(--text3); width:22px; text-align:right; flex-shrink:0; font-variant-numeric:tabular-nums; }
.track-nm { flex:1; min-width:0; font-size:13px; }
.track-empty { padding:24px; text-align:center; color:var(--text3); font-size:13px; }
.modal-links { padding:12px 18px; display:flex; gap:10px; }
.mlink { font-size:12px; color:var(--text2); border:0.5px solid var(--border2); padding:6px 12px; border-radius:99px; }
.mlink:hover { background:var(--surface2); color:var(--text); }

@media (max-width:560px){ .album-grid { grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:12px; } }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">💿</div>
      <div>
        <div class="brand-name">ALBUM LIBRARY</div>
        <div class="brand-sub">女團專輯資料庫 · 封面 + 收錄曲目</div>
      </div>
    </div>
    <a class="nav-link" href="index.html">← 回情報板</a>
  </header>

  <div class="toolbar">
    <input id="search" class="search" type="text" spellcheck="false" placeholder="搜尋女團或專輯名…">
    <span class="lib-meta" id="meta"></span>
  </div>

  <div id="content"><div class="status" id="status">載入專輯資料庫中…</div></div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" style="position:relative">
    <button class="modal-close" onclick="closeModal()" aria-label="關閉">×</button>
    <div class="modal-cover" id="m-cover"></div>
    <div id="m-tracks"></div>
    <div class="modal-links" id="m-links"></div>
  </div>
</div>

<script>
let LIB = {};        // group -> {albums:[...]}
let flatAlbums = {}; // albumId -> album (for modal)
let q = '';

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function load(){
  try {
    const r = await fetch('data/albums.json?t=' + Date.now());
    if (!r.ok) throw new Error('no file');
    const d = await r.json();
    LIB = d.groups || {};
    document.getElementById('meta').textContent =
      `${Object.keys(LIB).length} 團 · 更新於 ${d.updated_at || '—'}`;
    // build flat index
    for (const g in LIB) for (const a of (LIB[g].albums||[])) flatAlbums[a.id] = a;
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="status">尚無資料庫，請等每日任務產生 data/albums.json</div>';
  }
}

function render(){
  const content = document.getElementById('content');
  const groups = Object.keys(LIB).sort((a,b)=>a.localeCompare(b));
  const ql = q.toLowerCase();
  let html = '';
  let shown = 0;
  for (const g of groups){
    const albums = (LIB[g].albums || []).filter(a =>
      !ql || g.toLowerCase().includes(ql) || (a.album||'').toLowerCase().includes(ql));
    if (!albums.length) continue;
    shown++;
    html += `<div class="group-block">
      <div class="group-head"><span class="group-name">${esc(g)}</span>
        <span class="group-count">${albums.length} 張專輯</span></div>
      <div class="album-grid">` +
      albums.map(a => `<div class="album" onclick="openAlbum(${a.id})">
        <div class="album-cover">${a.art
          ? `<img loading="lazy" src="${esc(a.art)}" alt="${esc(a.album)}">`
          : '<span class="ph">無封面</span>'}</div>
        <div class="album-info">
          <div class="album-title" title="${esc(a.album)}">${esc(a.album)}</div>
          <div class="album-year">${esc(a.year||'')}${a.track_count?` · ${a.track_count} 曲`:''}</div>
        </div>
      </div>`).join('') + `</div></div>`;
  }
  content.innerHTML = shown ? html : '<div class="status">查無符合的女團或專輯</div>';
}

function openAlbum(id){
  const a = flatAlbums[id];
  if (!a) return;
  document.getElementById('m-cover').innerHTML = `
    ${a.art ? `<img src="${esc(a.art)}" alt="${esc(a.album)}">` : ''}
    <div class="modal-cv-info">
      <div class="modal-album">${esc(a.album)}</div>
      <div class="modal-sub">${esc(a.artist||'')}${a.year?` · ${esc(a.year)}`:''}${a.track_count?` · ${a.track_count} 曲`:''}</div>
    </div>`;
  const tracks = a.tracks || [];
  document.getElementById('m-tracks').innerHTML = tracks.length
    ? tracks.map((t,i)=>`<div class="track-row"><span class="track-no">${i+1}</span><span class="track-nm">${esc(t)}</span></div>`).join('')
    : '<div class="track-empty">此專輯曲目未預先收錄（點下方到 Apple Music 看完整曲目）</div>';
  const ytQ = encodeURIComponent(`${a.artist||''} ${a.album||''}`);
  document.getElementById('m-links').innerHTML =
    `${a.itunes_url?`<a class="mlink" href="${esc(a.itunes_url)}" target="_blank" rel="noopener">Apple Music ↗</a>`:''}
     <a class="mlink" href="https://www.youtube.com/results?search_query=${ytQ}" target="_blank" rel="noopener">YouTube 搜尋 ↗</a>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('search').addEventListener('input', e=>{ q=e.target.value.trim(); render(); });

load();
</script>
</body>
</html>
